<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Menu Đồ Ăn</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f8fafc, #dbeafe);
      margin: 0;
      padding: 0;
      color: #1f2937;
    }
    .wrapper {
      max-width: 560px;
      margin: 40px auto;
      padding: 20px;
    }
    header {
      text-align: center;
      margin-bottom: 24px;
    }
    header h1 {
      margin: 0;
      font-size: 28px;
    }
    header p {
      margin: 8px 0 0;
      color: #4b5563;
    }
    .menu {
      display: grid;
      gap: 16px;
    }
    .menu-item {
      background: #ffffff;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    }
    .menu-item h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }
    .menu-item p {
      margin: 0 0 14px;
      color: #6b7280;
    }
    .menu-item button {
      display: inline-block;
      padding: 10px 18px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .menu-item button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>Menu Hôm Nay</h1>
      <p>Chọn món bạn muốn đặt ngay.</p>
    </header>

    <div class="menu">
      <div class="menu-item">
        <h2>Phở bò</h2>
        <p>Giá: 75.000₫</p>
        <button onclick="buyItem('Phở bò')">Mua ngay</button>
      </div>

      <div class="menu-item">
        <h2>Bánh mì chả</h2>
        <p>Giá: 45.000₫</p>
        <button onclick="buyItem('Bánh mì chả')">Mua ngay</button>
      </div>
    </div>
  </div>

  <script>
    function buyItem(name) {
      alert('Bạn đã chọn mua: ' + name);
    }
  </script>
</body>
</html>
